<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Speech Synthesizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            resize: none;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #007bff;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        select, input[type="range"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #dcdde1;
            font-size: 14px;
            box-sizing: border-box;
        }
        .slider-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .slider-group label {
            flex-basis: 20%;
            font-weight: 600;
            color: #555;
        }
        .slider-group input {
            flex-basis: 75%;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        #speak-btn {
            background-color: #007bff;
        }
        #speak-btn:hover {
            background-color: #0056b3;
        }
        #stop-btn {
            background-color: #e74c3c;
        }
        #stop-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Text to Speech</h2>
    <textarea id="text-input" placeholder="Type something here to hear it read out loud..."></textarea>
    
    <div class="controls">
        <select id="voice-select">
            <option value="">Loading voices...</option>
        </select>
        
        <div class="slider-group">
            <label for="rate">Speed</label>
            <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">
        </div>
        
        <div class="slider-group">
            <label for="pitch">Pitch</label>
            <input type="range" id="pitch" min="0" max="2" value="1" step="0.1">
        </div>

        <div class="buttons">
            <button id="speak-btn">Speak</button>
            <button id="stop-btn">Stop</button>
        </div>
    </div>
</div>

<script>
    // Initialize the Web Speech API
    const synth = window.speechSynthesis;
    
    // Grab UI elements
    const textInput = document.getElementById('text-input');
    const voiceSelect = document.getElementById('voice-select');
    const rate = document.getElementById('rate');
    const pitch = document.getElementById('pitch');
    const speakBtn = document.getElementById('speak-btn');
    const stopBtn = document.getElementById('stop-btn');

    let voices = [];

    // Fetch and populate available voices
    function populateVoiceList() {
        voices = synth.getVoices();
        voiceSelect.innerHTML = ''; // Clear default option
        
        voices.forEach((voice) => {
            const option = document.createElement('option');
            option.textContent = `${voice.name} (${voice.lang})`;
            
            if (voice.default) {
                option.textContent += ' — Default';
            }

            option.setAttribute('data-lang', voice.lang);
            option.setAttribute('data-name', voice.name);
            voiceSelect.appendChild(option);
        });
    }

    // Modern browsers load voices asynchronously, so we wait for the event
    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    // Function to handle the actual speaking
    function speak() {
        // If it's already speaking, cancel the current text to start the new one
        if (synth.speaking) {
            synth.cancel();
        }

        if (textInput.value.trim() !== '') {
            const utterThis = new SpeechSynthesisUtterance(textInput.value);

            // Find the selected voice and apply it
            const selectedOption = voiceSelect.selectedOptions[0].getAttribute('data-name');
            for (let i = 0; i < voices.length; i++) {
                if (voices[i].name === selectedOption) {
                    utterThis.voice = voices[i];
                    break;
                }
            }

            // Apply pitch and speed settings
            utterThis.pitch = pitch.value;
            utterThis.rate = rate.value;
            
            // Speak the text
            synth.speak(utterThis);
        }
    }

    // Event Listeners
    speakBtn.addEventListener('click', speak);
    
    stopBtn.addEventListener('click', () => {
        synth.cancel();
    });
</script>

</body>
</html>
